<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - MedicalDB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
            background-color: #f8fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .error-message {
            color: #dc2626;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            min-height: 1.2rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .login-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.85rem;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .login-btn:hover {
            background-color: var(--primary-hover);
        }

        .login-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">🏥 MedicalDB</div>
        <div class="subtitle">システムにログインしてください</div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">ログインID</label>
                <input type="text" id="username" placeholder="IDを入力" autocomplete="username" required autofocus>
            </div>
            
            <div class="form-group" style="margin-bottom: 0.5rem;">
                <label for="password">パスワード</label>
                <input type="password" id="password" placeholder="パスワードを入力" autocomplete="current-password" required>
            </div>

            <div id="error-msg" class="error-message">IDまたはパスワードが間違っています。</div>

            <button type="submit" class="login-btn">ログイン</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const idInput = document.getElementById('username').value.trim();
            const pwInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // Hardcoded Credentials based on user request
            if (idInput === 'rh' && pwInput === '0050') {
                sessionStorage.setItem('isLoggedIn', 'true');
                // Redirect to home dashboard
                window.location.href = 'index.html';
            } else {
                errorMsg.style.opacity = '1';
                // Reset password field
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退院者一覧 - MedicalDB</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <nav class="navbar">
        <div class="logo">MedicalDB 🏥</div>
        <ul class="nav-links">
            <li><a href="index.html">ホーム</a></li>
            <li><a href="admission.html">入院</a></li>
            <li><a href="outpatient.html">外来</a></li>
            <li><a href="nursing-care.html">介護医療院</a></li>
            <li><a href="../reservation-app/index.html">予約表</a></li>
        </ul>
        <div class="import-wrapper"
            style="margin-left: auto; display: flex; align-items: center; padding-right: 1.5rem; gap: 1rem;">
            <label for="excel-import" class="btn import-btn"
                style="margin: 0; background-color: #10b981; color: white; cursor: pointer;">Excelインポート</label>
            <input type="file" id="excel-import" accept=".xlsx, .xls" style="display: none;">
        </div>
    </nav>

    <main class="container">
        <div class="header-v2">
            <div>
                <h1>📁 退院者一覧</h1>
                <p>退院した患者の履歴データです。必要に応じて元のリストへ復元できます。</p>
            </div>
            <a href="index.html" class="btn secondary">ホームへ戻る</a>
        </div>

        <div class="table-wrapper">
            <table class="patient-table">
                <thead>
                    <tr>
                        <th>入院患者ID</th>
                        <th>氏名</th>
                        <th>区分</th>
                        <th>疾患種別</th>
                        <th>診断名</th>
                        <th>診断日</th>
                        <th>残日数</th>
                        <th>要介護</th>
                        <th>退院日</th>
                        <th>終了理由</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="archivedAdmissionTableBody">
                    <!-- JavaScriptで動的に生成 -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="ja">

<head>
    <script>
        if (!sessionStorage.getItem('isLoggedIn')) {
            window.location.href = 'login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年間実績表 - MedicalDB</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="performance.js" defer></script>
    <style>
        .perf-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        .perf-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .year-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .year-btn {
            background-color: #f1f5f9;
            color: #334155;
            border: none;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .year-btn:hover { background-color: #e2e8f0; color: #0f172a; }
        .year-display { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
        .header-actions { display: flex; gap: 0.75rem; align-items: center; }
        .btn-analyze {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(99,102,241,0.3);
        }
        .btn-analyze:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
        .perf-table-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
            border: 1px solid #e2e8f0;
        }
        .perf-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        .perf-table th, .perf-table td {
            padding: 1rem;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
        }
        .perf-table th:first-child, .perf-table td:first-child {
            text-align: left;
            position: sticky;
            left: 0;
            background: white;
            z-index: 10;
            font-weight: 600;
            box-shadow: 2px 0 4px rgba(0,0,0,0.02);
        }
        .perf-table th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 11;
        }
        .perf-table th:first-child { z-index: 12; background-color: #f8fafc; }
        .perf-table tr:hover td:not(:first-child) { background-color: #f8fafc; }
        .section-header { background-color: #f1f5f9 !important; color: #334155 !important; font-weight: 700 !important; }
        .row-sub { color: #64748b; font-size: 0.9rem; }
        .row-sub td:first-child { padding-left: 2rem !important; }
        .total-row { background-color: #eff6ff !important; font-weight: 700 !important; color: #1e40af !important; }
        .total-row td:first-child { background-color: #eff6ff !important; }

        /* ===== Analysis Modal ===== */
        .analysis-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .analysis-modal-overlay.open { display: flex; }
        .analysis-modal {
            background: white;
            border-radius: 16px;
            width: min(90vw, 900px);
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: modalSlide 0.25s ease;
        }
        @keyframes modalSlide {
            from { transform: translateY(20px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .analysis-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.75rem;
            border-bottom: 1px solid #e2e8f0;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .analysis-modal-header h2 { margin: 0; font-size: 1.1rem; }
        .modal-close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .modal-close-btn:hover { background: rgba(255,255,255,0.35); }
        .analysis-tabs {
            display: flex;
            gap: 0;
            padding: 0 1.75rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            overflow-x: auto;
        }
        .analysis-tab {
            padding: 0.85rem 1.25rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .analysis-tab.active { color: #6366f1; border-bottom-color: #6366f1; }
        .analysis-tab:hover:not(.active) { color: #334155; background: #f1f5f9; }
        .analysis-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.75rem;
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .chart-container {
            position: relative;
            height: 350px;
        }
        /* Summary table inside modal */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .summary-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 1.25rem;
        }
        .summary-card .label { font-size: 0.8rem; color: #64748b; margin-bottom: 0.4rem; }
        .summary-card .value { font-size: 1.5rem; font-weight: 700; color: #0f172a; }
        .summary-card .sub { font-size: 0.8rem; color: #475569; margin-top: 0.25rem; }
        .summary-card.highlight { background: #eff6ff; border-color: #bfdbfe; }
        .summary-card.highlight .value { color: #1d4ed8; }
        .detail-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        .detail-table th { background: #f1f5f9; padding: 0.6rem 0.75rem; text-align: left; color: #475569; font-weight: 600; }
        .detail-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #f1f5f9; }
        .detail-table tr:last-child td { border-bottom: none; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .badge-blue { background: #dbeafe; color: #1d4ed8; }
        .badge-green { background: #dcfce7; color: #15803d; }
        .badge-red { background: #fee2e2; color: #b91c1c; }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">MedicalDB 🏥</div>
        <ul class="nav-links">
            <li><a href="index.html">ホーム</a></li>
            <li><a href="all-patients.html">全患者</a></li>
            <li><a href="admission.html">入院</a></li>
            <li><a href="outpatient.html">外来</a></li>
            <li><a href="nursing-care.html">介護医療院</a></li>
            <li><a href="../reservation-app/index.html">予約表</a></li>
            <li><a href="performance.html" class="active">実績表</a></li>
        </ul>
    </nav>

    <main class="perf-container">
        <div class="perf-header">
            <div>
                <h1 style="color: #0f172a; margin-bottom: 0.5rem;">📊 年間実績表</h1>
                <p style="color: #64748b; margin: 0;">各月の売上情報を集計して表示します。</p>
            </div>
            <div class="year-controls">
                <button class="year-btn" id="prev-year">◀</button>
                <div class="year-display" id="current-year-display">2026年</div>
                <button class="year-btn" id="next-year">▶</button>
            </div>
            <div class="header-actions">
                <input type="file" id="perf-csv-import" accept=".xlsx, .xls" style="display: none;">
                <label for="perf-csv-import" class="btn secondary" style="margin: 0; background-color: #f8fafc; color: #475569; border: 1px solid #cbd5e1; cursor: pointer; padding: 0.6rem 1.25rem; border-radius: 8px; font-weight: 600; display: flex; align-items: center;">
                    📥 インポート
                </label>
                <button class="btn-analyze" id="analysis-btn">📈 分析</button>
                <button id="refresh-btn" class="btn primary" style="margin: 0;">🔄 更新</button>
            </div>
        </div>

        <div class="perf-table-wrapper">
            <table class="perf-table" id="perf-table">
                <thead>
                    <tr>
                        <th style="min-width: 200px;">項目</th>
                        <th>1月</th><th>2月</th><th>3月</th><th>4月</th>
                        <th>5月</th><th>6月</th><th>7月</th><th>8月</th>
                        <th>9月</th><th>10月</th><th>11月</th><th>12月</th>
                        <th style="background-color: #e0f2fe; color: #0369a1;">合計</th>
                    </tr>
                </thead>
                <tbody id="perf-table-body">
                    <tr><td colspan="14" style="text-align: center; padding: 3rem; color: #64748b;">データを読み込み中...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Analysis Modal -->
    <div class="analysis-modal-overlay" id="analysis-modal-overlay">
        <div class="analysis-modal">
            <div class="analysis-modal-header">
                <h2>📈 実績分析 — <span id="analysis-year-title">2026年</span></h2>
                <button class="modal-close-btn" id="close-analysis-modal">✕</button>
            </div>
            <div class="analysis-tabs">
                <button class="analysis-tab active" data-tab="trend">📊 売上トレンド</button>
                <button class="analysis-tab" data-tab="composition">🥧 カテゴリ構成比</button>
                <button class="analysis-tab" data-tab="yoy">📅 前年同月比</button>
                <button class="analysis-tab" data-tab="summary">📋 実績サマリー</button>
            </div>
            <div class="analysis-body">
                <!-- Tab: Trend -->
                <div class="tab-panel active" id="tab-trend">
                    <h3 style="margin-top:0; color:#1e293b;">月別売上トレンド（積み上げ）</h3>
                    <div class="chart-container">
                        <canvas id="chart-trend"></canvas>
                    </div>
                </div>
                <!-- Tab: Composition -->
                <div class="tab-panel" id="tab-composition">
                    <h3 style="margin-top:0; color:#1e293b;">年間カテゴリ構成比</h3>
                    <div style="display:flex; gap:2rem; align-items:flex-start; flex-wrap:wrap;">
                        <div style="flex:0 0 300px; height:300px; position:relative;">
                            <canvas id="chart-composition"></canvas>
                        </div>
                        <div id="composition-legend" style="flex:1; min-width:200px; padding-top:1rem;"></div>
                    </div>
                </div>
                <!-- Tab: YoY -->
                <div class="tab-panel" id="tab-yoy">
                    <h3 style="margin-top:0; color:#1e293b;">前年同月比（合計売上）</h3>
                    <div class="chart-container">
                        <canvas id="chart-yoy"></canvas>
                    </div>
                    <p style="color:#64748b; font-size:0.82rem; margin-top:0.5rem;">※ 前年のデータは同じブラウザのlocalStorageに保存されたデータを参照します。</p>
                </div>
                <!-- Tab: Summary -->
                <div class="tab-panel" id="tab-summary">
                    <h3 style="margin-top:0; color:#1e293b;">実績サマリー</h3>
                    <div class="summary-grid" id="summary-grid"></div>
                    <h4 style="color:#475569; margin-bottom:0.5rem;">月別詳細</h4>
                    <table class="detail-table" id="detail-table">
                        <thead><tr><th>月</th><th>入院</th><th>外来</th><th>評価・目標</th><th>介護医療院</th><th>合計</th><th>前月比</th></tr></thead>
                        <tbody id="detail-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

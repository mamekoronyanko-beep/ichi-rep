<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者データベース - 全患者一覧</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js" defer></script>
</head>

<body>
    <nav class="navbar">
        <div class="logo">MedicalDB 🏥</div>
        <ul class="nav-links">
            <li><a href="index.html">ホーム</a></li>
            <li><a href="all-patients.html" class="active">全患者</a></li>
            <li><a href="admission.html">入院</a></li>
            <li><a href="outpatient.html">外来</a></li>
            <li><a href="nursing-care.html">介護医療院</a></li>
            <li><a href="../reservation-app/index.html">予約表</a></li>
        </ul>
        <div class="import-wrapper"
            style="margin-left: auto; display: flex; align-items: center; padding-right: 1.5rem; gap: 1rem;">
            <a href="../reservation-app/index.html" class="btn primary" style="margin: 0;">カレンダー（予約表）へ</a>
            <label for="excel-import" class="btn import-btn"
                style="margin: 0; background-color: #10b981; color: white; cursor: pointer;">Excelインポート</label>
            <input type="file" id="excel-import" accept=".xlsx, .xls" style="display: none;">
        </div>
    </nav>
    <main class="container">
        <div class="header-v2">
            <div>
                <h1>📊 全患者基本データ</h1>
                <p style="color:var(--text-muted);">入院・外来・介護の全患者データを一括で確認・検索できます。</p>
            </div>
            <div id="refresh-btn" class="btn" style="cursor: pointer; padding: 0.5rem; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: white; border: 1px solid var(--border-color); color: var(--text-muted);" title="データを更新">
                🔄
            </div>
        </div>

        <div class="header-actions">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="global-search" class="search-input" placeholder="名前・ID・疾患名で検索...">
            </div>
        </div>

        <div class="card" style="padding: 0; overflow-x: auto; margin-top: 1rem;">
            <table id="basicPatientTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>氏名</th>
                        <th>種別</th>
                        <th>カテゴリー</th>
                        <th>疾患名</th>
                        <th>次回予定日</th>
                        <th>書類提出日</th>
                    </tr>
                </thead>
                <tbody id="basicPatientTableBody">
                    <!-- データがここに挿入されます -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Patient Details Modal (Reused) -->
    <div id="detailsModal" class="modal">
        <div class="modal-content" style="max-width: 900px;">
            <div class="modal-header">
                <h2 id="details-patient-name">患者詳細</h2>
                <span class="close-btn" onclick="document.getElementById('detailsModal').style.display='none'">&times;</span>
            </div>
            <div id="details-content" style="padding: 1.5rem;">
                <!-- Content will be injected by JS -->
            </div>
        </div>
    </div>

    <!-- Edit Modal (Reused) -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>患者データの編集</h2>
                <span class="close-btn" onclick="document.getElementById('editModal').style.display='none'">&times;</span>
            </div>
            <form id="editPatientForm" style="padding: 1.5rem;">
                <input type="hidden" id="edit-p-id">
                <div class="form-group">
                    <label>氏名</label>
                    <input type="text" id="edit-p-name" required>
                </div>
                <div class="form-group">
                    <label>種別</label>
                    <select id="edit-p-type">
                        <option value="admission">入院</option>
                        <option value="outpatient">外来</option>
                        <option value="nursing_care">介護医療院</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>カテゴリー</label>
                    <select id="edit-p-category">
                        <option value="運動器">運動器</option>
                        <option value="脳血管">脳血管</option>
                        <option value="廃用">廃用</option>
                        <option value="消炎">消炎</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>疾患名</label>
                    <input type="text" id="edit-p-disease">
                </div>
                <div class="form-group">
                    <label>診断日/発症日</label>
                    <input type="date" id="edit-p-diag-date">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn primary" style="flex: 1;">変更を保存</button>
                    <button type="button" class="btn secondary" style="flex: 1;" onclick="document.getElementById('editModal').style.display='none'">キャンセル</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>

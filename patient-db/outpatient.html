<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者データベース - 外来患者管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
    <nav class="navbar">
        <div class="logo">MedicalDB 🏥</div>
        <ul class="nav-links">
            <li><a href="index.html">ホーム</a></li>
            <li><a href="admission.html">入院</a></li>
            <li><a href="outpatient.html" class="active">外来</a></li>
            <li><a href="nursing-care.html">介護医療院</a></li>
            <li><a href="../reservation-app/index.html">予約表</a></li>
        </ul>
    </nav>
    <main class="container">
        <div class="header-v2">
            <div>
                <h1>🏥 外来患者管理</h1>
                <p>現在通院中の外来患者一覧です。ダブルクリックで詳細を確認・編集できます。</p>
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: flex-start;">
                <button class="btn print-btn" onclick="window.print()"
                    style="background-color: #64748b; color: white; margin-top: 0;">印刷する</button>
                <button class="btn primary" style="margin-top: 0;"
                    onclick="document.getElementById('addOutpatientModal').style.display='flex'">新規外来追加</button>
            </div>
        </div>

        <div class="table-container">
            <table id="outpatientTable">
                <thead>
                    <tr>
                        <th>外来患者ID</th>
                        <th>氏名</th>
                        <th>区分</th>
                        <th>疾患種別</th>
                        <th>疾患名</th>
                        <th>診断日</th>
                        <th>残日数</th>
                        <th>次回リハ予約日</th>
                        <th>書類提出日</th>
                        <th>要介護</th>
                        <th>アクション</th>
                    </tr>
                </thead>
                <tbody id="outpatientTableBody">
                    <!-- Data will be populated here -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal for adding new outpatient -->
    <div id="addOutpatientModal" class="modal">
        <div class="modal-content">
            <span class="close"
                onclick="document.getElementById('addOutpatientModal').style.display='none'">&times;</span>
            <h2>新規外来患者登録</h2>
            <form id="addOutpatientForm" onsubmit="handleOutpatientSubmit(event)">
                <div class="form-group">
                    <label for="opPatientId">外来患者ID</label>
                    <input type="text" id="opPatientId" required placeholder="例: OP-2001">
                </div>
                <div class="form-group">
                    <label for="opPatientName">氏名</label>
                    <input type="text" id="opPatientName" required placeholder="例: 鈴木 健太">
                </div>
                <div class="form-group">
                    <label for="opPatientCategory">疾患種別</label>
                    <select id="opPatientCategory" required>
                        <option value="">選択してください</option>
                        <option value="運動器">運動器</option>
                        <option value="脳血管">脳血管</option>
                        <option value="廃用">廃用</option>
                        <option value="消炎">消炎</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="opDiseaseName">疾患名</label>
                    <input type="text" id="opDiseaseName" required placeholder="例: 高血圧">
                </div>
                <div class="form-group">
                    <label for="opVisitDate">診断日</label>
                    <input type="date" id="opVisitDate" required>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;">
                    <input type="checkbox" id="opPatientNursingCare" style="width: auto;">
                    <label for="opPatientNursingCare" style="margin: 0; cursor: pointer;">要介護認定あり</label>
                </div>
                <button type="submit" class="btn primary full-width">登録する</button>
            </form>
        </div>
    </div>

    <!-- Patient Details Modal -->
    <div id="patientDetailsModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close"
                onclick="document.getElementById('patientDetailsModal').style.display='none'">&times;</span>
            <h2 id="details-patient-name" style="margin-bottom: 0.25rem;">患者詳細</h2>
            <div id="details-patient-category" style="margin-bottom: 0.5rem;"></div>
            <p id="details-patient-id" style="color: var(--text-muted); margin-bottom: 1.5rem;"></p>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem;">
                <div style="background: var(--bg-color); padding: 1rem; border-radius: 8px;">
                    <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.25rem;">キャンセル率</p>
                    <p id="details-cancel-rate" style="font-size: 1.5rem; font-weight: bold; color: #ef4444;">--%</p>
                    <p id="details-cancel-count" style="font-size: 0.8rem; color: var(--text-muted);">0 / 0 回</p>
                </div>
                <div style="background: var(--bg-color); padding: 1rem; border-radius: 8px;">
                    <p id="next-visit-label"
                        style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.25rem;">次回リハ予約日</p>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem;">
                        <input type="date" id="next-visit-date"
                            style="padding: 0.25rem; border: 1px solid #ccc; border-radius: 4px; width: 100%;">
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" id="details-nursing-care" style="width: auto;">
                            <label for="details-nursing-care"
                                style="font-size: 0.85rem; cursor: pointer; margin: 0;">要介護認定あり</label>
                        </div>
                        <p
                            style="font-size: 0.9rem; color: var(--text-muted); margin-top: 0.5rem; margin-bottom: 0.25rem;">
                            書類提出予定日</p>
                        <input type="date" id="doc-submission-date"
                            style="padding: 0.25rem; border: 1px solid #ccc; border-radius: 4px; width: 100%; margin-bottom: 0.5rem;">
                        <button onclick="saveNextVisit()" class="btn primary"
                            style="padding: 0.25rem 0.5rem; margin: 0; width: 100%;">修正を保存</button>
                    </div>
                </div>
            </div>

            <h3
                style="margin-bottom: 1rem; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                予約・来院履歴</h3>
            <div
                style="max-height: 250px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px;">
                <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                    <thead style="background-color: var(--bg-color); position: sticky; top: 0;">
                        <tr>
                            <th
                                style="padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border-color);">
                                日付</th>
                            <th
                                style="padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border-color);">
                                時間</th>
                            <th
                                style="padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border-color);">
                                内容</th>
                            <th
                                style="padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border-color);">
                                キャンセル理由</th>
                            <th
                                style="padding: 0.75rem; text-align: center; border-bottom: 1px solid var(--border-color);">
                                状況</th>
                        </tr>
                    </thead>
                    <tbody id="details-history-body">
                        <!-- History rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Meeting Calendar Modal -->
    <div id="calendarModal" class="modal">
        <div class="modal-content" style="max-width: 1100px; width: 95%;">
            <span class="close-btn"
                onclick="document.getElementById('calendarModal').style.display='none'">&times;</span>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 id="calendarMonthTitle" style="margin: 0;">面談予定</h2>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn" onclick="changeCalendarMonth(-1)"
                        style="padding: 5px 10px; background-color: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1;">◀
                        前月</button>
                    <button class="btn" onclick="changeCalendarMonth(1)"
                        style="padding: 5px 10px; background-color: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1;">次月
                        ▶</button>
                </div>
            </div>
            <div class="calendar-layout">
                <div class="doctor-sidebar" id="doctorSidebar">
                    <!-- Doctor Mini Calendars will be rendered here -->
                </div>
                <div class="calendar-main">
                    <div id="calendarGrid" class="calendar-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
